<section class="editarPersonajes">

    <section class="heroPersonajes">

        <img
            src="frontend/img/heroBanner1.png"
            alt="Agregar personaje"
        >

    </section>

    <div class="lineaSeparadora"></div>

    <h2>

        AGREGAR PERSONAJE

    </h2>

    <div class="tablaPersonajes">

        <form id="formAgregarPersonaje">

            <table>

                <tbody>

                    <tr>

                        <th>Nombre</th>

                        <td>

                            <input
                                type="text"
                                id="nombre"
                                placeholder="Ingrese el nombre del personaje"
                                required
                            >

                        </td>

                    </tr>

                    <tr>

                        <th>Subcolección</th>

                        <td>

                            <select
                                id="sub_coleccion_id"
                                required
                            >

                                <option value="">Seleccione...</option>

                                <option value="1">Base Pinky Pow 2006</option>
                                <option value="2">Base Peores Que Nunca</option>
                                <option value="3">Base Rebeldes con Causa</option>
                                <option value="4">Base Super Heroes</option>
                                <option value="5">Base Pinky Pow 2020</option>
                                <option value="6">Sub-colección Baby</option>
                                <option value="7">Sub-colección X</option>

                            </select>

                        </td>

                    </tr>

                    <tr>

                        <th>Tipo de llavero</th>

                        <td>

                            <select
                                id="tipo_llavero_id"
                                required
                            >

                                <option value="">Seleccione...</option>

                                <option value="1">Llavero 3D</option>
                                <option value="2">Colgante 3D</option>
                                <option value="3">Colgante Plano</option>
                                <option value="4">Fluffy Colgante</option>

                            </select>

                        </td>

                    </tr>

                    <tr>

                        <th>Imagen</th>

                        <td>

                            <input
                                type="file"
                                id="img_personaje"
                                accept=".png,.jpg,.jpeg"
                                required
                            >

                        </td>

                    </tr>

                    <tr>

                        <td colspan="2" style="text-align:center; padding-top:20px;">

                            <button type="submit">

                                Guardar personaje

                            </button>

                        </td>

                    </tr>

                </tbody>

            </table>

        </form>

    </div>

</section>
