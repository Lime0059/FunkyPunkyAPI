<section class="agregar-personaje">

    <form id="formAgregarPersonaje">

        <label>Nombre</label>

        <input
            type="text"
            id="nombre"
            required
        >

        <label>Subcolección</label>

        <select
            id="sub_coleccion_id"
            required
        >

            <option value="">Seleccione...</option>

            <option value="1">Base Pinky Pow 2006</option>
            <option value="2">Base Peores Que Nunca</option>
            <option value="3">Base Rebeldes con Causa</option>
            <option value="4">Base Super Heroes</option>
            <option value="5">Base Pinky Pow 2020</option>
            <option value="6">Sub-colección Baby</option>
            <option value="7">Sub-colección X</option>

        </select>

        <label>Tipo de llavero</label>

        <select
            id="tipo_llavero_id"
            required
        >

            <option value="">Seleccione...</option>

            <option value="1">Llavero 3D</option>
            <option value="2">Colgante 3D</option>
            <option value="3">Colgante Plano</option>
            <option value="4">Fluffy colgante</option>

        </select>

        <label>Imagen</label>

        <input
            type="file"
            id="img_personaje"
            accept=".png,.jpg,.jpeg"
            required
        >

        <button type="submit">

            Guardar personaje

        </button>

    </form>

</section>
