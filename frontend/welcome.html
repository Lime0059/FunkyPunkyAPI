<main class="bienvenida">

    <div class="bienvenida__contenedor-logo">

        <img
            src="frontend/img/Bienvenida.png"
            alt="Logo Funki Punky"
            class="bienvenida__logo bienvenida__logo--normal"
        >

        <img
            src="frontend/img/Bienvenida2.png"
            alt="Logo Funki Punky Activo"
            class="bienvenida__logo bienvenida__logo--activo"
        >

    </div>

    <div class="bienvenida__opciones">

        <button
            class="bienvenida__enlace"
            data-destino="entrar"
        >

            Entrar

        </button>

        <span class="bienvenida__separador"></span>

        <button
            class="bienvenida__enlace"
            data-destino="login"
        >

            Iniciar

        </button>

    </div>

</main>
